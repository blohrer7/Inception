; PHP-FPM Pool-Konfiguration für WordPress
; Eine Pool-Datei = ein Satz Worker-Prozesse

[www]
; Prozesse laufen als www-data (gleicher User wie nginx → Dateirechte passen)
user    = www-data
group   = www-data

; TCP-Port statt Unix-Socket, weil NGINX in einem separaten Container läuft
listen  = 9000
listen.owner = www-data
listen.group = www-data

; dynamic: Anzahl Worker-Prozesse wächst und schrumpft je nach Last
pm                   = dynamic
pm.max_children      = 5   ; maximale parallele PHP-Prozesse
pm.start_servers     = 2   ; Prozesse beim Start
pm.min_spare_servers = 1   ; Mindest-Idle-Prozesse
pm.max_spare_servers = 3   ; Maximal-Idle-Prozesse

; Logs in stderr umleiten → Docker fängt sie mit "docker logs" ein
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on
