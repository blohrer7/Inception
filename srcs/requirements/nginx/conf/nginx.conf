server {
    # Nur HTTPS – kein HTTP-Block, kein Redirect von 80 (Subject: nur Port 443)
    listen      443 ssl;
    listen      [::]:443 ssl;  # IPv6
    server_name blohrer.42.fr;

    # Selbstsigniertes Zertifikat, generiert von generate-cert.sh beim ersten Start
    ssl_certificate     /etc/nginx/ssl/cert.crt;
    ssl_certificate_key /etc/nginx/ssl/cert.key;

    # Subject-Anforderung: ausschließlich TLSv1.2 und TLSv1.3
    # TLSv1.0 und TLSv1.1 sind absichtlich nicht aufgeführt
    ssl_protocols       TLSv1.2 TLSv1.3;

    # WordPress liegt im shared Volume (gemountet von wordpress-Container)
    root  /var/www/wordpress;
    index index.php index.html;

    # WordPress-Permalinks: erst echte Datei/Verzeichnis suchen, dann an index.php übergeben
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP-Dateien per FastCGI an den wordpress-Container weiterleiten
    # "wordpress" wird durch Docker-DNS auf die Container-IP aufgelöst
    location ~ \.php$ {
        fastcgi_pass   wordpress:9000;
        fastcgi_index  index.php;
        include        fastcgi_params;
        # SCRIPT_FILENAME teilt PHP-FPM den absoluten Pfad zur Datei mit
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # .htaccess und ähnliche Dot-Files niemals ausliefern
    location ~ /\.ht {
        deny all;
    }
}
